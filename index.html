<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日新颖消费品情报报告</title>
  <style>
    :root {
      --bg: #eef3f6;
      --paper: #ffffff;
      --ink: #17313b;
      --muted: #5f7480;
      --line: #d8e3e8;
      --accent: #0f766e;
      --accent-soft: #e8f5f3;
      --link: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(15, 118, 110, 0.10), transparent 28%),
        linear-gradient(180deg, #f4f8fa 0%, var(--bg) 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 56px 20px 80px;
    }

    .hero,
    .section {
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: 0 18px 40px rgba(23, 49, 59, 0.08);
    }

    .hero {
      padding: 28px;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
    }

    .desc {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .cta {
      display: inline-block;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    .cta.secondary {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: #b5ded7;
    }

    .section {
      margin-top: 26px;
      padding: 22px 24px;
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .helper {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: #fbfdfe;
    }

    .item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .item p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .item a {
      color: var(--link);
      text-decoration: none;
      font-weight: 700;
    }

    .empty {
      padding: 18px;
      border: 1px dashed var(--line);
      color: var(--muted);
      background: #fbfdfe;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <p class="eyebrow">Product Intelligence</p>
      <h1>每日新颖消费品情报报告</h1>
      <p class="desc">面向日本电商卖家、OEM 客户、家居杂货、美容个护、户外园艺、宠物用品与家用小电器客户。报告聚焦新品、趋势品、潜力品，并加入供应链可落地判断。</p>
      <div class="cta-row">
        <a class="cta" id="latest-link" href="./latest-report.html">查看最新报告</a>
        <a class="cta secondary" href="./latest-report.html">固定入口</a>
      </div>
      <p class="helper">后续更新只需要上传新的日报 HTML，并把 <code>reports.json</code> 最上面插入一条新记录；首页和固定入口会自动跟着更新。</p>
    </section>

    <section class="section">
      <h2>报告归档</h2>
      <div class="list" id="report-list">
        <div class="empty">正在加载报告列表...</div>
      </div>
    </section>
  </main>

  <script>
    async function loadReports() {
      const list = document.getElementById("report-list");
      const latestLink = document.getElementById("latest-link");

      try {
        const response = await fetch("./reports.json", { cache: "no-store" });
        if (!response.ok) throw new Error("manifest missing");
        const reports = await response.json();

        if (!Array.isArray(reports) || reports.length === 0) {
          list.innerHTML = '<div class="empty">还没有可展示的日报记录。</div>';
          return;
        }

        latestLink.href = reports[0].file;
        list.innerHTML = reports.map((report) => `
          <div class="item">
            <strong>${report.date}</strong>
            <p>${report.summary}</p>
            <a href="${report.file}">打开报告</a>
          </div>
        `).join("");
      } catch (error) {
        list.innerHTML = '<div class="empty">报告清单加载失败。请确认 <code>reports.json</code> 已上传到仓库根目录。</div>';
      }
    }

    loadReports();
  </script>
</body>
</html>
