      font-weight: 800;

      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
    }

    .desc {

      color: var(--muted);

    }

    .cta-row {
      display: flex;

      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      text-decoration: none;
    }

    .cta.secondary {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: #b5ded7;
    }

    .section {
      margin-top: 26px;
      padding: 22px 24px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.9);
    }

    .section h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .item {
      padding: 14px 16px;
      border: 1px solid var(--line);
      background: #fbfdfe;
    }

    .item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 16px;
    }

    .item p {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 13px;
