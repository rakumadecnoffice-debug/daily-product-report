<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>最新报告入口</title>
</head>
<body>
  <p id="status">正在跳转到最新报告...</p>

  <script>
    async function redirectToLatest() {
      const status = document.getElementById("status");

      try {
        const response = await fetch("./reports.json", { cache: "no-store" });
        if (!response.ok) throw new Error("manifest missing");
        const reports = await response.json();

        if (!Array.isArray(reports) || reports.length === 0) {
          status.textContent = "没有找到报告清单，请检查 reports.json。";
          return;
        }

        const latest = reports[0];
        status.innerHTML = `正在跳转到最新报告：<a href="${latest.file}">${latest.date}</a>`;
        window.location.replace(latest.file);
      } catch (error) {
        status.textContent = "最新报告跳转失败，请确认 reports.json 已上传。";
      }
    }

    redirectToLatest();
  </script>
</body>
</html>
